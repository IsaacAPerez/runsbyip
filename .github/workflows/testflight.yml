name: Deploy to TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Unlock Keychain
        run: |
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db
          security set-keychain-settings ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" ~/Library/Keychains/login.keychain-db

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Install Bundler dependencies
        run: bundle install

      - name: Resolve Swift Packages
        run: xcodebuild -resolvePackageDependencies -project RunsByIP.xcodeproj -scheme RunsByIP

      - name: Build and Upload to TestFlight
        env:
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
          BB_PASSWORD: ${{ secrets.BB_PASSWORD }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: ${{ secrets.ASC_KEY_PATH }}
        run: bundle exec fastlane beta
