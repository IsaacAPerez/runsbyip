name: Deploy to TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '!ios/docs/**'
      - '.github/workflows/testflight.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: self-hosted
    defaults:
      run:
        working-directory: ios

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          clean: true

      # Keychain unlock dropped: the runner inherits the user session's
      # already-unlocked login keychain (macOS auto-login + no-timeout
      # keychain settings + apple-tool/apple/codesign already on the
      # partition list from prior runs). Eliminates the need for a
      # KEYCHAIN_PASSWORD GH Secret.

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Activate rbenv Ruby
        run: |
          echo "$HOME/.rbenv/shims" >> "$GITHUB_PATH"
          echo "$HOME/.rbenv/bin" >> "$GITHUB_PATH"

      - name: Materialize ASC API key from 1Password
        run: |
          # Pull the .p8 fresh from 1P each build. $RUNNER_TEMP is wiped
          # at the end of the job, so the file is short-lived by design.
          /opt/homebrew/bin/op document get "App Store Connect API Key - RRYR26DJLS" \
            --vault Personal \
            --out-file "$RUNNER_TEMP/AuthKey_RRYR26DJLS.p8" \
            --force
          chmod 600 "$RUNNER_TEMP/AuthKey_RRYR26DJLS.p8"
          echo "ASC_KEY_PATH=$RUNNER_TEMP/AuthKey_RRYR26DJLS.p8" >> "$GITHUB_ENV"

      - name: Install Bundler dependencies
        run: bundle install

      - name: Resolve Swift Packages
        run: xcodebuild -resolvePackageDependencies -project RunsByIP.xcodeproj -scheme RunsByIP

      - name: Build and Upload to TestFlight
        env:
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
          BB_PASSWORD: ${{ secrets.BB_PASSWORD }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          # MATCH_GIT_BASIC_AUTHORIZATION removed — the self-hosted runner
          # already has gh CLI auth + the gh-credential helper configured
          # globally in ~/.config/git, so Match's git clone of
          # ios-certificates authenticates automatically. If this run fails
          # at the match step with a 403/401, restore this env var (and
          # the underlying GH Secret + 1P item).
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          # ASC_KEY_PATH is set by the 'Materialize ASC API key' step above
          # (via $GITHUB_ENV), pointing at $RUNNER_TEMP. No GH Secret needed.
        run: bundle exec fastlane beta
