name: Deploy to TestFlight

on:
  push:
    branches: [main]
    paths:
      - 'ios/**'
      - '!ios/docs/**'
      - '.github/workflows/testflight.yml'
  workflow_dispatch:
    inputs:
      submit_for_review:
        description: 'After TestFlight upload, submit the latest build for App Store review'
        type: boolean
        default: false

jobs:
  deploy:
    name: Build & Upload to TestFlight
    runs-on: self-hosted
    permissions:
      contents: write  # let the bumped-marketing-version commit step push back to main
    defaults:
      run:
        working-directory: ios

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          clean: true

      # Keychain unlock dropped: the runner inherits the user session's
      # already-unlocked login keychain (macOS auto-login + no-timeout
      # keychain settings + apple-tool/apple/codesign already on the
      # partition list from prior runs). Eliminates the need for a
      # KEYCHAIN_PASSWORD GH Secret.

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Activate rbenv Ruby
        run: |
          echo "$HOME/.rbenv/shims" >> "$GITHUB_PATH"
          echo "$HOME/.rbenv/bin" >> "$GITHUB_PATH"

      - name: Materialize ASC API key from 1Password
        env:
          BB_PASSWORD: ${{ secrets.BB_PASSWORD }}
        run: /Users/isaacperez/.openclaw/scripts/ci-materialize-asc-key.sh

      - name: Install Bundler dependencies
        run: bundle install

      - name: Resolve Swift Packages
        run: xcodebuild -resolvePackageDependencies -project RunsByIP.xcodeproj -scheme RunsByIP

      - name: Build and Upload to TestFlight
        id: fastlane_beta
        env:
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
          BB_PASSWORD: ${{ secrets.BB_PASSWORD }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          # MATCH_GIT_BASIC_AUTHORIZATION removed — the self-hosted runner
          # already has gh CLI auth + the gh-credential helper configured
          # globally in ~/.config/git, so Match's git clone of
          # ios-certificates authenticates automatically. If this run fails
          # at the match step with a 403/401, restore this env var (and
          # the underlying GH Secret + 1P item).
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          # ASC_KEY_PATH is set by the 'Materialize ASC API key' step above
          # (via $GITHUB_ENV), pointing at $RUNNER_TEMP. No GH Secret needed.
        run: bundle exec fastlane beta

      - name: Notify on pre-fastlane failure
        # Fires only when an earlier step (1P key materialize, bundle install,
        # SPM resolve, etc.) failed and fastlane never got to run its own
        # error hook. Without this, those failures are silent — no iMessage.
        if: failure() && steps.fastlane_beta.outcome == 'skipped'
        env:
          BB_PASSWORD: ${{ secrets.BB_PASSWORD }}
        run: |
          scripts/notify_ci.sh ci failure "Workflow step failed before fastlane started — check the GH Actions run (likely 1Password materialize or SPM resolve)"

      - name: Commit bumped marketing version
        if: success() && env.MARKETING_BUMPED != ''
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "ci-bot"
          git config user.email "ci@isaacperez.dev"
          git add -f ios/project.yml
          if git diff --cached --quiet; then
            echo "project.yml not modified — skipping commit"
            exit 0
          fi
          git commit -m "chore(ios): bump RunsByIP marketing version to ${MARKETING_BUMPED} [skip ci]"
          git push

      - name: Submit for App Store review
        if: success() && github.event_name == 'workflow_dispatch' && inputs.submit_for_review
        env:
          LANG: en_US.UTF-8
          LC_ALL: en_US.UTF-8
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: bundle exec fastlane submit
