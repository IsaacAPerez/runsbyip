<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — RunsByIP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen">

  <!-- Header -->
  <header class="bg-gray-900 border-b border-gray-800">
    <div class="max-w-4xl mx-auto px-4 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold">RunsByIP <span class="text-gray-500 font-normal">Admin</span></h1>
      </div>
      <div id="header-actions" class="hidden flex items-center gap-4">
        <a href="index.html" class="text-sm text-gray-400 hover:text-white transition-colors">View Site</a>
        <button id="logout-btn" class="text-sm text-gray-400 hover:text-white transition-colors">Logout</button>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 py-8">

    <!-- Login Form -->
    <div id="login-section" class="max-w-sm mx-auto">
      <div class="bg-gray-900 rounded-xl border border-gray-800 p-6">
        <h2 class="text-lg font-semibold mb-4 text-center">Admin Login</h2>
        <form id="login-form" class="space-y-4">
          <div>
            <label for="login-email" class="block text-sm text-gray-400 mb-1">Email</label>
            <input type="email" id="login-email" required
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent">
          </div>
          <div>
            <label for="login-password" class="block text-sm text-gray-400 mb-1">Password</label>
            <input type="password" id="login-password" required
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent">
          </div>
          <p id="login-error" class="text-red-400 text-sm hidden"></p>
          <button type="submit" id="login-btn"
            class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-2.5 rounded-lg transition-colors">
            Log In
          </button>
        </form>
      </div>
    </div>

    <!-- Dashboard (hidden until login) -->
    <div id="dashboard" class="hidden">

      <!-- Create Session -->
      <div class="bg-gray-900 rounded-xl border border-gray-800 p-6 mb-6">
        <h2 class="text-lg font-semibold mb-4">Create Session</h2>
        <form id="create-session-form" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="session-date" class="block text-sm text-gray-400 mb-1">Date</label>
            <input type="date" id="new-session-date" required
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent">
          </div>
          <div>
            <label for="session-time" class="block text-sm text-gray-400 mb-1">Time</label>
            <input type="text" id="new-session-time" value="7:00 PM" required
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent">
          </div>
          <div class="sm:col-span-2">
            <label for="session-location" class="block text-sm text-gray-400 mb-1">Location</label>
            <input type="text" id="new-session-location" required placeholder="Gym name & address"
              class="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-orange-500 focus:border-transparent">
          </div>
          <div class="sm:col-span-2">
            <button type="submit" id="create-session-btn"
              class="bg-orange-500 hover:bg-orange-600 text-white font-semibold px-6 py-2.5 rounded-lg transition-colors">
              Create Session
            </button>
          </div>
        </form>
      </div>

      <!-- Sessions List -->
      <div id="sessions-list" class="space-y-4"></div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
