name: RunsByIP
options:
  bundleIdPrefix: com.isaacperez
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    DEVELOPMENT_TEAM: "K98N9692X9"
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "1"

packages:
  supabase-swift:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  stripe-ios:
    url: https://github.com/stripe/stripe-ios
    from: "23.0.0"

targets:
  RunsByIP:
    type: application
    platform: iOS
    bundleId: com.isaacperez.runsbyip
    deploymentTarget: "18.0"
    sources:
      - path: RunsByIP-iOS
        excludes:
          - "**/.DS_Store"
    resources:
      - path: RunsByIP-iOS/Assets.xcassets
      - path: RunsByIP-iOS/Resources
        excludes:
          - "README-plist.md"
    info:
      path: RunsByIP-iOS/Info.plist
      properties:
        CFBundleName: RunsByIP
        CFBundleDisplayName: RunsByIP
        CFBundleIdentifier: com.isaacperez.runsbyip
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.1"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - remote-notification
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - runsbyip
            CFBundleURLName: com.isaacperez.runsbyip
        NSCameraUsageDescription: "Used for profile photo"
        NSPhotoLibraryUsageDescription: "Used for profile photo"
        UIUserInterfaceStyle: Dark
        ITSAppUsesNonExemptEncryption: false
    entitlements:
      path: RunsByIP-iOS/RunsByIP.entitlements
      properties:
        aps-environment: development
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.associated-domains:
          - applinks:runsbyip.com
        com.apple.developer.in-app-payments:
          - merchant.com.isaacperez.runsbyip
    dependencies:
      - package: supabase-swift
        product: Supabase
      - package: stripe-ios
        product: StripePayments
      - package: stripe-ios
        product: StripeApplePay
    settings:
      base:
        INFOPLIST_FILE: RunsByIP-iOS/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.isaacperez.runsbyip
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
